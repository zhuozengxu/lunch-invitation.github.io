<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>午餐邀请</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #fce4ec 0%, #f3e5f5 50%, #e8eaf6 100%);
    overflow: hidden;
    position: relative;
  }

  .card {
    background: rgba(255, 255, 255, 0.95);
    border-radius: 20px;
    padding: 40px 30px;
    max-width: 340px;
    width: 90%;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.12);
    text-align: center;
    animation: fadeInUp 0.6s ease-out;
    position: relative;
    z-index: 10;
  }

  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .icon { font-size: 48px; margin-bottom: 20px; }

  .message {
    font-size: 18px;
    line-height: 1.8;
    color: #333;
    margin-bottom: 36px;
    font-weight: 500;
  }

  .buttons {
    display: flex;
    gap: 16px;
    justify-content: center;
    position: relative;
    min-height: 50px;
  }

  .btn {
    padding: 14px 32px;
    border: none;
    border-radius: 25px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }

  .btn:active { transform: scale(0.96); }

  .btn-accept {
    background: linear-gradient(135deg, #e91e63, #f06292);
    color: white;
    box-shadow: 0 4px 15px rgba(233, 30, 99, 0.4);
  }

  .btn-reject {
    background: linear-gradient(135deg, #90a4ae, #b0bec5);
    color: white;
    box-shadow: 0 4px 15px rgba(144, 164, 174, 0.3);
    position: absolute;
    transition: left 0.3s ease, top 0.3s ease, transform 0.2s;
    z-index: 20;
  }

  .btn-close {
    background: linear-gradient(135deg, #66bb6a, #81c784);
    color: white;
    box-shadow: 0 4px 15px rgba(102, 187, 106, 0.4);
    margin-top: 30px;
  }

  .result-message {
    font-size: 18px;
    line-height: 1.8;
    color: #333;
    font-weight: 500;
  }

  .hearts {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 0;
    overflow: hidden;
  }

  .heart-float {
    position: absolute;
    font-size: 20px;
    animation: floatUp 4s ease-in forwards;
    opacity: 0;
  }

  @keyframes floatUp {
    0% { opacity: 0; transform: translateY(0) scale(0.5) rotate(0deg); }
    10% { opacity: 1; }
    90% { opacity: 1; }
    100% { opacity: 0; transform: translateY(-100vh) scale(1.2) rotate(45deg); }
  }

  .hidden { display: none !important; }

  .toast {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0.8);
    background: rgba(0, 0, 0, 0.75);
    color: white;
    padding: 14px 28px;
    border-radius: 12px;
    font-size: 15px;
    z-index: 999;
    opacity: 0;
    transition: opacity 0.3s, transform 0.3s;
    pointer-events: none;
  }

  .toast.show {
    opacity: 1;
    transform: translate(-50%, -50%) scale(1);
  }
</style>
</head>
<body>

<!-- 邀请页面 -->
<div class="card" id="invitePage">
  <div class="icon">💌</div>
  <div class="message">我诚挚地向你发出邀请，这个周六或者周日一起共进午餐，是否接受我的邀请？</div>
  <div class="buttons">
    <button class="btn btn-accept" id="btnAccept" onclick="accept()">接受</button>
    <button class="btn btn-reject" id="btnReject">拒绝</button>
  </div>
</div>

<!-- 接受后页面 -->
<div class="card hidden" id="resultPage">
  <div class="icon">🎉</div>
  <div class="result-message">看来你已经接受了我的邀请，那就赶紧把你的忌口发给我吧</div>
  <button class="btn btn-close" onclick="closePage()">关闭</button>
</div>

<!-- 提示框 -->
<div class="toast" id="toast"></div>

<!-- 飘心容器 -->
<div class="hearts" id="hearts"></div>

<script>
  var accepted = false;
  var rejectMessages = [
    '不许拒绝！😤',
    '再想想嘛～😊',
    '拒绝无效！🙅',
    '你确定？再按一次试试？😏',
    '这个按钮坏了哦～😜',
    '别点这个嘛～🥺',
    '你的手指是不是滑了？😂',
  ];
  var rejectCount = 0;

  // 阻止关闭
  window.addEventListener('beforeunload', function (e) {
    if (!accepted) {
      e.preventDefault();
      e.returnValue = '还没接受邀请呢，不能走哦！';
      return e.returnValue;
    }
  });

  // 阻止后退
  history.pushState(null, '', location.href);
  window.addEventListener('popstate', function () {
    if (!accepted) {
      history.pushState(null, '', location.href);
      showToast('接受邀请后才能离开哦～');
    }
  });

  // 拒绝按钮逃跑
  var btnReject = document.getElementById('btnReject');
  var card = document.getElementById('invitePage');

  function dodgeButton() {
    var cardRect = card.getBoundingClientRect();
    var btnW = btnReject.offsetWidth;
    var btnH = btnReject.offsetHeight;

    // 在卡片范围内随机移动
    var maxX = cardRect.width - btnW - 20;
    var maxY = 200;
    var randX = Math.random() * maxX - maxX / 2;
    var randY = -(Math.random() * maxY + 20);

    btnReject.style.left = 'calc(50% + ' + randX + 'px)';
    btnReject.style.top = randY + 'px';

    rejectCount++;
    var msg = rejectMessages[Math.min(rejectCount - 1, rejectMessages.length - 1)];
    showToast(msg);

    // 多次拒绝后按钮缩小
    if (rejectCount >= 5) {
      var s = Math.max(0.5, 1 - (rejectCount - 4) * 0.1);
      btnReject.style.transform = 'scale(' + s + ')';
    }

    // 超过8次直接隐藏
    if (rejectCount >= 8) {
      btnReject.classList.add('hidden');
      showToast('拒绝按钮已经跑掉了，乖乖接受吧～😘');
    }
  }

  btnReject.addEventListener('touchstart', function (e) {
    e.preventDefault();
    dodgeButton();
  }, { passive: false });

  btnReject.addEventListener('mousedown', function (e) {
    e.preventDefault();
    dodgeButton();
  });

  // 接受
  function accept() {
    accepted = true;
    document.getElementById('invitePage').classList.add('hidden');
    document.getElementById('resultPage').classList.remove('hidden');
    startHearts();
  }

  // 关闭
  function closePage() {
    document.body.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;min-height:100vh;font-size:24px;color:#666;">期待与你的午餐 🥂</div>';
    // 尝试关闭窗口
    try { window.close(); } catch (e) {}
    try { WeixinJSBridge.call('closeWindow'); } catch (e) {}
  }

  // Toast 提示
  function showToast(msg) {
    var t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(t._timer);
    t._timer = setTimeout(function () {
      t.classList.remove('show');
    }, 1600);
  }

  // 飘心动画
  function startHearts() {
    var container = document.getElementById('hearts');
    var emojis = ['❤️', '💕', '💖', '🌸', '✨', '🥂', '🍽️'];
    var count = 0;
    var timer = setInterval(function () {
      if (count++ > 20) { clearInterval(timer); return; }
      var span = document.createElement('span');
      span.className = 'heart-float';
      span.textContent = emojis[Math.floor(Math.random() * emojis.length)];
      span.style.left = Math.random() * 100 + '%';
      span.style.bottom = '-30px';
      span.style.fontSize = (16 + Math.random() * 20) + 'px';
      span.style.animationDuration = (3 + Math.random() * 3) + 's';
      container.appendChild(span);
      setTimeout(function () { span.remove(); }, 6000);
    }, 200);
  }
</script>
</body>
</html>
